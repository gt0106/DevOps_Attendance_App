services:
  - type: web
    name: devops-attendance-tracker
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_DB_NAME
        value: student_dashboard
      - key: MONGODB_URI
        sync: false
